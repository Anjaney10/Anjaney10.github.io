# The Site Configuration

theme: jekyll-theme-chirpy
lang: en
timezone: UTC

title: Bio x AI by Anjaney

tagline: Learnings from my raw experiences
description: >-
  My personal blog to share Bioinformatics x AI tools, resources, and tutorials with beginners

url: "https://anjaney10.github.io"
baseurl: ""

github:
  username: Anjaney10

social:
  name: Anjaney
  # email: anjaney10@users.noreply.github.com
  links:
    - https://github.com/Anjaney10
    - https://www.linkedin.com/in/anjaneyj/

avatar: https://avatars.githubusercontent.com/u/49697391?v=1

theme_mode: dark

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

plugins:
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      author: Anjaney
      toc: true
      # comments: true
      permalink: /posts/:title/

read_time: true

# comments:
