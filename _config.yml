#     category_id: ""
#     mapping: "pathname"
#     strict: "0"
#     input_position: "bottom"
#     lang: "en"
#     reactions_enabled: "1"

toc: true

# google_analytics:

jekyll-archives:
  enabled: [tags, categories]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

compress_html:
  ignore:
    envs: all
    
