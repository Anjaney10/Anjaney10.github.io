<section class="card mt-4">
  <div class="card-body">
    <h3 class="mt-0">📬 Newsletter</h3>
    <p class="mb-3">Get new tutorials and explainers in your inbox.</p>
    <form action="{{ site.newsletter_url }}" method="post">
      <label for="newsletter-email" class="form-label">Email address</label>
      <input id="newsletter-email" name="email" type="email" class="form-control" required placeholder="you@example.com">
      <button type="submit" class="btn btn-primary mt-3">Subscribe</button>
    </form>
  </div>
</section>
